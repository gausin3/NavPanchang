name: Android CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------
  # Stage 1 — Validation. Lint, static analysis, unit tests.
  # Runs on every push and PR.
  # ---------------------------------------------------------------------
  validate:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run lint
        run: ./gradlew :app:lintDebug

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/

  # ---------------------------------------------------------------------
  # Stage 2 — Alpha build. Signed AAB + SBOM artifact.
  # Runs only on pushes to main (not PRs, not tags).
  # ---------------------------------------------------------------------
  build:
    name: Build Signed AAB
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/upload-key.jks

      - name: Build signed release AAB
        env:
          KEYSTORE_FILE: /tmp/upload-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:bundleRelease

      - name: Upload AAB + mapping artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/mapping.txt
          retention-days: 30

  # ---------------------------------------------------------------------
  # Stage 3 — Deploy to Play Store Internal Testing track.
  # Runs only on tag pushes (e.g. v1.0.0).
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy to Internal Testing
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: com.navpanchang
          releaseFiles: 'bundle/release/*.aab'
          track: internal
          status: completed
          mappingFile: mapping/release/mapping.txt

  # ---------------------------------------------------------------------
  # Stage 4 — Publish source archive for AGPL compliance.
  # Runs on tag push — attaches a source-tree zip to the GitHub Release so
  # users can audit the code without needing a GitHub account.
  # ---------------------------------------------------------------------
  source-release:
    name: Publish source archive (AGPL compliance)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          git archive --format=tar.gz \
            --prefix="navpanchang-${TAG_NAME}/" \
            -o "navpanchang-${TAG_NAME}-source.tar.gz" HEAD

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: navpanchang-*-source.tar.gz
          body: |
            NavPanchang ${{ github.ref_name }}

            This release is distributed under AGPL v3. The complete source code
            is attached as `navpanchang-*-source.tar.gz` for auditing and
            redistribution per AGPL §5 and §13.

            Swiss Ephemeris attribution: see
            `app/src/main/assets/licenses/swisseph_NOTICE.txt` in the archive.
